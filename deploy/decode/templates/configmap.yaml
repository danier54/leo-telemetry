apiVersion: v1
kind: ConfigMap
metadata:
  name: decode-config
  namespace: leo-telemetry
  labels:
    {{- include "decode.labels" . | nindent 4 }}
data:
  REDIS_URL: "redis://ingest-redis:6379/0"
  DECODE_POLL_INTERVAL_SECONDS: {{ .Values.config.decodePollIntervalSeconds | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
