# Namespace-scoped developer role shared by all teammates: full day-to-day
# access to the leo-telemetry namespace (pods + logs/exec/port-forward,
# workloads, config, secrets), and nothing cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: leo-telemetry-dev
  namespace: leo-telemetry
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - pods/portforward
      - configmaps
      - secrets
      - services
      - persistentvolumeclaims
      - events
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, update, patch, delete]
