# One ServiceAccount per, plus a long-lived token Secret
# The Secret objects hold no data in git -- Kubernetes populates the token
# once they're applied to the cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jordan
  namespace: leo-telemetry
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: taurean
  namespace: leo-telemetry
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elaine
  namespace: leo-telemetry
---
apiVersion: v1
kind: Secret
metadata:
  name: jordan-token
  namespace: leo-telemetry
  annotations:
    kubernetes.io/service-account.name: jordan
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: Secret
metadata:
  name: taurean-token
  namespace: leo-telemetry
  annotations:
    kubernetes.io/service-account.name: taurean
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: Secret
metadata:
  name: elaine-token
  namespace: leo-telemetry
  annotations:
    kubernetes.io/service-account.name: elaine
type: kubernetes.io/service-account-token
