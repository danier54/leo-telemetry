apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ingest-redis
  namespace: leo-telemetry
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-redis
  namespace: leo-telemetry
  labels:
    app: ingest-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ingest-redis
  template:
    metadata:
      labels:
        app: ingest-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args: ["--appendonly", "yes"]
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ingest-redis
---
apiVersion: v1
kind: Service
metadata:
  name: ingest-redis
  namespace: leo-telemetry
spec:
  selector:
    app: ingest-redis
  ports:
    - port: 6379
      targetPort: 6379
