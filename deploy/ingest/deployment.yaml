apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: leo-telemetry
  labels:
    app: ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      # If ghcr.io/<owner>/leo-telemetry-ingest is private, add:
      #   imagePullSecrets:
      #     - name: ghcr-pull-secret
      containers:
        - name: ingest
          image: ghcr.io/danier54/leo-telemetry-ingest:latest
          envFrom:
            - configMapRef:
                name: ingest-config
          env:
            - name: SATNOGS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ingest-secrets
                  key: satnogs-api-token
                  optional: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
