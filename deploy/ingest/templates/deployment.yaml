apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: leo-telemetry
  labels:
    {{- include "ingest.labels" . | nindent 4 }}
    app: ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      # If {{ .Values.image.repository }} is private, add:
      #   imagePullSecrets:
      #     - name: ghcr-pull-secret
      containers:
        - name: ingest
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          envFrom:
            - configMapRef:
                name: ingest-config
          env:
            - name: SATNOGS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ingest-secrets
                  key: satnogs-api-token
                  optional: true
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ingest-postgres-secrets
                  key: app-password
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
