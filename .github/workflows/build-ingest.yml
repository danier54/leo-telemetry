name: Build & Push Ingest Image

on:
  push:
    branches: [main]
    paths:
      - "leo_telemetry/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build-ingest.yml"

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/leo-telemetry-ingest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install yq
        run: |
          curl -sL "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64" -o yq
          chmod +x yq
          sudo mv yq /usr/local/bin/yq

      - name: Pin the deployed image to this commit
        run: yq -i '.image.tag = "${{ github.sha }}"' deploy/ingest/values.yaml

      - name: Create pull request for manifest update
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: deploy/ingest/values.yaml
          branch: ci/pin-ingest-image-${{ github.sha }}
          delete-branch: true
          commit-message: deploy: pin ingest image to ${{ github.sha }}
          title: "deploy: pin ingest image to ${{ github.sha }}"
          body: "Automated manifest update from the build-and-push workflow."
