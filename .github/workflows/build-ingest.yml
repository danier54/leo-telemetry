name: Build & Push Ingest Image

on:
  push:
    branches: [main]
    paths:
      - "leo_telemetry/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build-ingest.yml"

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/leo-telemetry-ingest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install yq
        run: |
          curl -sL "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64" -o yq
          chmod +x yq
          sudo mv yq /usr/local/bin/yq

      - name: Pin the deployed image to this commit
        run: |
          yq -i '.image.tag = "${{ github.sha }}"' deploy/ingest/values.yaml
          yq -i '.image.tag = "${{ github.sha }}"' deploy/decode/values.yaml

      - name: Open and merge the manifest-pin PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/ingest/values.yaml deploy/decode/values.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi

          # main requires a PR (repo ruleset) -- direct pushes are rejected,
          # so open a short-lived branch/PR and merge it immediately instead
          # of trying to bypass the rule. required_approving_review_count is
          # 0, so this needs no human in the loop.
          branch="ci/pin-images-${{ github.sha }}"
          git checkout -b "$branch"
          git commit -m "deploy: pin ingest and decode images to ${{ github.sha }}"
          git push origin "$branch"

          pr_url=$(gh pr create --base main --head "$branch" \
            --title "deploy: pin ingest and decode images to ${{ github.sha }}" \
            --body "Automated tag pin from the image build.")
          gh pr merge "$pr_url" --merge --delete-branch
